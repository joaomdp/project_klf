<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0F0F14;border-radius:20px;overflow:hidden;border:1px solid #1e2030;max-width:480px;margin:0 auto;font-family:Arial,sans-serif">

  <!-- Linha de topo azul -->
  <tr><td style="background:linear-gradient(90deg,#3b82f6,#8B5CF6);height:4px;font-size:0;line-height:0">&nbsp;</td></tr>

  <!-- Logo -->
  <tr>
    <td style="padding:36px 40px 0;text-align:center">
      <img src="https://kingsfantasy-api.onrender.com/logo.png" height="52" alt="Kings Lendas" style="display:inline-block;border-radius:12px" />
    </td>
  </tr>

  <!-- Divider -->
  <tr><td style="padding:20px 40px 0"><div style="height:1px;background:linear-gradient(90deg,transparent,#1e2030,transparent)"></div></td></tr>

  <!-- Conteúdo principal -->
  <tr>
    <td style="padding:36px 40px 0;text-align:center">
      <p style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:2px;margin:0 0 12px">Segurança da Conta</p>
      <h1 style="font-size:26px;font-weight:900;color:#fff;margin:0 0 12px;letter-spacing:1px">Redefinir sua senha</h1>
      <p style="font-size:14px;color:#9ca3af;margin:0 0 32px;line-height:1.6">
        Recebemos uma solicitação para redefinir a senha da sua conta.<br>
        <span style="color:#6b7280;font-size:12px">O link expira em <strong style="color:#9ca3af">1 hora</strong>.</span>
      </p>

      <!-- Botão CTA -->
      <a href="{{ .ConfirmationURL }}" style="
        display:inline-block;
        background:linear-gradient(135deg,#3b82f6,#2563eb);
        color:#fff;
        font-size:13px;
        font-weight:900;
        text-decoration:none;
        padding:16px 48px;
        border-radius:14px;
        letter-spacing:2px;
        text-transform:uppercase;
        margin-bottom:28px;
      ">Redefinir minha senha</a>

      <!-- Aviso -->
      <div style="background:#1a1a1a;border:1px solid #2a2020;border-radius:10px;padding:12px 18px;margin-bottom:28px;text-align:left">
        <p style="font-size:12px;color:#9ca3af;margin:0;line-height:1.6">
          ⚠️ <strong style="color:#f59e0b">Não solicitou isso?</strong> Ignore este email. Sua senha não será alterada.
        </p>
      </div>
    </td>
  </tr>

  <!-- Footer -->
  <tr>
    <td style="padding:0 40px 36px">
      <div style="height:1px;background:linear-gradient(90deg,transparent,#1e2030,transparent);margin-bottom:20px"></div>
      <p style="font-size:11px;color:#4b5563;text-align:center;margin:0;line-height:1.8">
        Kings Lendas Fantasy<br>
        <span style="color:#374151">Por segurança, nunca pedimos sua senha por email.</span>
      </p>
    </td>
  </tr>

</table>
